{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:640px">
  <div class="glass-card p-4">
    <h4 class="fw-bold mb-4"><i class="bi bi-pencil-square me-2 text-primary"></i>Edit Profile</h4>
    <form method="POST" action="{{ url_for('profile.edit') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-medium">Full Name</label>
          <input type="text" class="form-control input-glass" name="full_name"
                 value="{{ current_user.full_name or '' }}"/>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-medium">Institution</label>
          <input type="text" class="form-control input-glass" name="institution"
                 value="{{ current_user.institution or '' }}"/>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-medium">Department</label>
          <input type="text" class="form-control input-glass" name="department"
                 value="{{ current_user.department or '' }}"/>
        </div>
        <div class="col-12">
          <label class="form-label fw-medium">Bio</label>
          <textarea class="form-control input-glass" name="bio" rows="3">{{ current_user.bio or '' }}</textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-medium">Theme</label>
          <select class="form-select input-glass" name="theme">
            <option value="dark"  {% if current_user.theme_preference == 'dark'  %}selected{% endif %}>Dark</option>
            <option value="light" {% if current_user.theme_preference == 'light' %}selected{% endif %}>Light</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-medium">Unit System</label>
          <select class="form-select input-glass" name="unit_system">
            <option value="SI"       {% if current_user.unit_system == 'SI'       %}selected{% endif %}>SI (metric)</option>
            <option value="Imperial" {% if current_user.unit_system == 'Imperial' %}selected{% endif %}>Imperial</option>
          </select>
        </div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary btn-glow">
          <i class="bi bi-check-circle me-2"></i>Save Changes
        </button>
        <a href="{{ url_for('profile.index') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
