{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:480px">
  <div class="glass-card p-4">
    <h4 class="fw-bold mb-4"><i class="bi bi-key me-2 text-warning"></i>Change Password</h4>
    <form method="POST" action="{{ url_for('auth.change_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="mb-3">
        <label class="form-label fw-medium">Current Password</label>
        <input type="password" class="form-control input-glass" name="current_password" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-medium">New Password</label>
        <input type="password" class="form-control input-glass" name="new_password" required minlength="8"
               placeholder="Minimum 8 characters"/>
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium">Confirm New Password</label>
        <input type="password" class="form-control input-glass" name="confirm_password" required/>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning btn-glow text-dark fw-bold">
          <i class="bi bi-shield-lock me-2"></i>Update Password
        </button>
        <a href="{{ url_for('profile.index') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
