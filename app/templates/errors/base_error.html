<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{% block error_code %}Error{% endblock %} | ChemDesignAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet"/>
</head>
<body>
<div class="error-page">
  <div class="text-center px-4">
    <div class="error-code">{% block error_title %}{% endblock %}</div>
    <h2 class="h3 fw-bold mb-3">{% block error_heading %}Something went wrong{% endblock %}</h2>
    <p class="text-muted mb-4" style="max-width:480px;margin:0 auto">
      {% block error_message %}An unexpected error occurred.{% endblock %}
    </p>
    <div class="d-flex gap-3 justify-content-center">
      <a href="/" class="btn btn-primary btn-glow">
        <i class="bi bi-house me-2"></i>Go Home
      </a>
      <button onclick="history.back()" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-2"></i>Go Back
      </button>
    </div>
    <div class="mt-5 text-muted small">
      <i class="bi bi-atom me-1"></i>ChemDesignAI — AI Process Equipment Design Platform
    </div>
  </div>
</div>
</body>
</html>
